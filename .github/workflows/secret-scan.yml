name: Secret scan

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    - cron: '0 3 * * 0' # weekly on Sunday at 03:00 UTC

jobs:
  gitleaks-scan:
    name: Run gitleaks and upload report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: zricethezav/gitleaks-action@v1
        with:
          args: detect --source=. --report-path=gitleaks-report.json --redact

      - name: Upload gitleaks report
        uses: actions/upload-artifact@v3
        with:
          name: gitleaks-report
          path: gitleaks-report.json

      - name: Fail if leaks found
        # This step inspects the JSON report and fails the job if any leaks were reported
        run: |
          if [ -f gitleaks-report.json ]; then
            count=$(jq 'length' gitleaks-report.json || echo 0)
            echo "gitleaks found $count findings"
            if [ "$count" -gt 0 ]; then
              echo "Secrets detected by gitleaks. See gitleaks-report artifact for details."
              exit 1
            fi
          else
            echo "No gitleaks report produced"
          fi
